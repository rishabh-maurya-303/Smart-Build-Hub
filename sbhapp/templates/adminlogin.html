{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <title>Admin Login</title>
</head>

<body>
    <div class="container-fluid">
        <div class="row vh-100" style="background-color: black;" id="bg12">
            <div class=" col-10 col-sm-8 col-md-7 col-lg-5 col-xl-4 mx-auto my-auto">
                <div class="card p-4 text-white text-center" data-aos="fade-up" data-aos-duration="3000">
                    <div class="text-center">
                        <img src="{% static 'images/smartbuild_Logo_dark.png' %}" height="90px" alt="">
                        <h4>Welcome Admin</h4>
                    </div>
                    {% if messages %}
                    {% for m in messages %}
                    <div class="alert alert-success alert-dismissible fade show" role="alert">
                        {{m}}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    {% endfor %}
                    {% endif %}
                    <form method="POST" class="mt-4">
                        {% csrf_token %}
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control place1" id="floatingInput" placeholder="name@example.com"
                                name="username" required>
                            <label for="floatingInput">User Name</label>
                        </div>
                        <div class="form-floating">
                            <input type="password" class="form-control place1" id="floatingPassword" placeholder="password"
                                name="password" required>
                            <label for="floatingPassword">Password</label>
                        </div>
                        <button class="btn w-100 mt-4 btn1" type="submit">Log in</button>
                        <p class="mt-5 text-start">&copy;SmartBuildHub <a href="{% url 'index' %}"
                                class="float-end text-white" style="text-decoration: none;">Back to <span style="color: #ff6900;">Home</span></a></p>
                    </form>
                    <div class="col-sm my-1">
                        <p class="m-0 text-start" style="font-size: smaller;">Design & Developed by <a href="{% url 'aboutdev' %}" target="_blank"
                                style="color: #ff6900; text-decoration: none;">Rishabh Maurya</a>.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'js/bootstrap.bundle.js' %}"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
</body>

</html>
